<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalkTo — Chat with Any Fictional Character</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a12;
      --bg-secondary: #12121e;
      --bg-card: #16162a;
      --bg-input: #1a1a30;
      --border: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.1);
      --text: #e8e8f0;
      --text-secondary: #b0b0c8;
      --text-muted: #6a6a88;
      --purple: #a78bfa;
      --purple-dark: #7c5fcf;
      --purple-glow: rgba(167,139,250,0.1);
      --violet: #8b5cf6;
      --pink: #ec4899;
      --amber: #fbbf24;
      --emerald: #34d399;
      --red: #f87171;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-full: 9999px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 500; }
    button { cursor: pointer; border: none; font-family: inherit; }

    .bg-glow {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-glow::before {
      content: ''; position: absolute;
      top: -20%; left: -10%; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(167,139,250,0.06) 0%, transparent 70%);
      border-radius: 50%;
    }
    .bg-glow::after {
      content: ''; position: absolute;
      bottom: -20%; right: -10%; width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(236,72,153,0.05) 0%, transparent 70%);
      border-radius: 50%;
    }

    /* ─── NAVBAR ─── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,10,18,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-brand .icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: 0 4px 20px rgba(167,139,250,0.3);
    }
    .nav-brand h1 {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-history-btn {
      padding: 8px 18px; border-radius: var(--radius-full);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-secondary); font-size: 12px; font-weight: 500;
      transition: all 0.3s; display: flex; align-items: center; gap: 6px;
    }
    .nav-history-btn:hover { border-color: var(--purple); color: var(--purple); }
    .nav-new-btn {
      padding: 8px 18px; border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      color: #fff; font-size: 12px; font-weight: 600; transition: all 0.3s;
    }
    .nav-new-btn:hover { box-shadow: 0 4px 20px rgba(167,139,250,0.3); transform: translateY(-1px); }

    /* ─── LANDING ─── */
    .landing {
      min-height: 100vh; padding: 100px 40px 60px;
      display: flex; flex-direction: column; align-items: center;
      position: relative; z-index: 1;
    }
    .landing.hidden { display: none; }
    .landing-header { text-align: center; margin-bottom: 48px; }
    .landing-header h2 {
      font-size: 52px; margin-bottom: 12px;
      background: linear-gradient(135deg, var(--text), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .landing-header p { font-size: 16px; color: var(--text-muted); max-width: 480px; margin: 0 auto; font-weight: 300; }

    .character-search { width: 100%; max-width: 600px; position: relative; margin-bottom: 48px; }
    .character-search input {
      width: 100%; padding: 18px 24px 18px 52px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; font-size: 16px; color: var(--text);
      font-family: 'Inter', sans-serif; outline: none; transition: all 0.3s;
    }
    .character-search input:focus { border-color: var(--purple); box-shadow: 0 0 0 4px rgba(167,139,250,0.08); }
    .character-search input::placeholder { color: var(--text-muted); }
    .character-search .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 18px; opacity: 0.4; }
    .character-search .search-go {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      padding: 10px 24px; border-radius: 12px;
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      color: #fff; font-size: 12px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s;
    }
    .character-search .search-go:hover { box-shadow: 0 4px 15px rgba(167,139,250,0.3); }

    .category-tabs { display: flex; gap: 8px; margin-bottom: 36px; flex-wrap: wrap; justify-content: center; }
    .cat-tab {
      padding: 8px 20px; border-radius: var(--radius-full);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 12px; font-weight: 500; transition: all 0.3s;
    }
    .cat-tab:hover, .cat-tab.active { background: var(--purple-glow); border-color: var(--purple); color: var(--purple); }

    .character-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px; width: 100%; max-width: 1000px;
    }
    .char-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 16px;
      text-align: center; cursor: pointer; transition: all 0.3s;
      animation: cardIn 0.4s ease both;
    }
    .char-card:hover { border-color: var(--purple); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(167,139,250,0.1); }
    @keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .char-avatar {
      width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center; font-size: 32px;
      background: linear-gradient(135deg, var(--bg-input), var(--bg-secondary));
      border: 2px solid var(--border);
    }
    .char-card h4 { font-family: 'Playfair Display', serif; font-size: 16px; margin-bottom: 4px; color: var(--text); }
    .char-card .char-source { font-size: 11px; color: var(--text-muted); font-style: italic; }
    .char-card .char-type {
      display: inline-block; margin-top: 8px; padding: 2px 10px;
      border-radius: var(--radius-full); font-size: 9px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .type-book { background: rgba(251,191,36,0.1); color: var(--amber); }
    .type-movie { background: rgba(236,72,153,0.1); color: var(--pink); }
    .type-cartoon { background: rgba(52,211,153,0.1); color: var(--emerald); }
    .type-anime { background: rgba(167,139,250,0.1); color: var(--purple); }

    /* ─── CHAT VIEW ─── */
    .chat-view { display: none; min-height: 100vh; flex-direction: column; position: relative; z-index: 1; }
    .chat-view.active { display: flex; }

    .chat-header {
      position: fixed; top: 56px; left: 0; right: 0; z-index: 90;
      background: rgba(10,10,18,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 40px; display: flex; align-items: center; gap: 16px;
    }
    .chat-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-input));
      border: 2px solid var(--border); flex-shrink: 0;
    }
    .chat-char-info h3 { font-size: 18px; line-height: 1.2; }
    .chat-char-info p { font-size: 11px; color: var(--text-muted); font-style: italic; }
    .chat-header-actions { margin-left: auto; display: flex; gap: 8px; }
    .chat-action-btn {
      padding: 6px 14px; border-radius: var(--radius-sm);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 11px; font-weight: 500; transition: all 0.3s;
    }
    .chat-action-btn:hover { border-color: var(--purple); color: var(--purple); }

    .chat-messages {
      flex: 1; padding: 140px 40px 100px;
      max-width: 800px; width: 100%; margin: 0 auto;
      display: flex; flex-direction: column; gap: 16px; min-height: 100vh;
    }

    .chat-intro { text-align: center; padding: 40px 20px; margin-bottom: 20px; }
    .chat-intro .intro-avatar {
      width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center; font-size: 40px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-input));
      border: 2px solid var(--border);
    }
    .chat-intro h3 { font-size: 24px; margin-bottom: 4px; }
    .chat-intro p { font-size: 13px; color: var(--text-muted); max-width: 400px; margin: 0 auto; line-height: 1.6; }
    .chat-intro .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .suggestion-chip {
      padding: 8px 16px; border-radius: var(--radius-full);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-secondary); font-size: 12px; transition: all 0.3s; cursor: pointer;
    }
    .suggestion-chip:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-glow); }

    .message { display: flex; gap: 12px; max-width: 85%; animation: msgIn 0.35s ease both; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.ai { align-self: flex-start; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      background: var(--bg-card); border: 1px solid var(--border);
    }
    .message.user .msg-avatar {
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      border: none; font-size: 13px; color: #fff;
    }

    .msg-bubble { padding: 14px 18px; border-radius: 18px; font-size: 14px; line-height: 1.7; }
    .message.user .msg-bubble {
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      color: #fff; border-bottom-right-radius: 4px;
    }
    .message.ai .msg-bubble {
      background: var(--bg-card); color: var(--text-secondary);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .message.ai .msg-bubble strong { color: var(--text); }
    .message.ai .msg-bubble em { color: var(--purple); font-style: italic; }

    .typing { display: flex; gap: 12px; align-self: flex-start; max-width: 85%; animation: msgIn 0.3s ease both; }
    .typing-dots {
      padding: 16px 20px; border-radius: 18px; border-bottom-left-radius: 4px;
      background: var(--bg-card); border: 1px solid var(--border);
      display: flex; gap: 5px;
    }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--purple);
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity:0.3; } 30% { transform: translateY(-8px); opacity:1; } }

    .chat-input-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,10,18,0.9); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border); padding: 16px 40px; z-index: 90;
    }
    .chat-input-container {
      max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end;
    }
    .chat-input-container textarea {
      flex: 1; padding: 14px 18px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text);
      font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; resize: none; max-height: 100px;
      line-height: 1.5; transition: border-color 0.3s;
    }
    .chat-input-container textarea:focus { border-color: var(--purple); }
    .chat-input-container textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      color: #fff; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; flex-shrink: 0;
    }
    .send-btn:hover { box-shadow: 0 4px 20px rgba(167,139,250,0.3); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ─── HISTORY PANEL ─── */
    .history-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .history-overlay.open { opacity: 1; visibility: visible; }
    .history-panel {
      position: fixed; top: 0; left: -400px; width: 380px; height: 100vh;
      background: var(--bg-secondary); border-right: 1px solid var(--border);
      z-index: 201; transition: left 0.4s ease; display: flex; flex-direction: column;
    }
    .history-panel.open { left: 0; }
    .hp-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .hp-header h3 { font-size: 20px; }
    .hp-close { background: none; font-size: 20px; color: var(--text-muted); transition: color 0.3s; }
    .hp-close:hover { color: var(--text); }
    .hp-items { flex: 1; overflow-y: auto; padding: 16px; }
    .hp-items::-webkit-scrollbar { width: 4px; }
    .hp-items::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
    .hp-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.2s; margin-bottom: 4px;
    }
    .hp-item:hover { background: var(--bg-card); }
    .hp-item .hp-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; background: var(--bg-card); border: 1px solid var(--border); flex-shrink: 0;
    }
    .hp-item-info h4 { font-size: 14px; font-family: 'Playfair Display', serif; margin-bottom: 2px; }
    .hp-item-info p { font-size: 11px; color: var(--text-muted); }
    .hp-item-delete {
      margin-left: auto; background: none; font-size: 14px;
      color: var(--text-muted); opacity: 0; transition: all 0.2s;
    }
    .hp-item:hover .hp-item-delete { opacity: 1; }
    .hp-item-delete:hover { color: var(--red); }
    .hp-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .hp-empty .icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
    .hp-empty p { font-family: 'Playfair Display', serif; font-size: 16px; }

    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); padding: 12px 24px; border-radius: var(--radius-sm);
      font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 500;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      .navbar { padding: 12px 20px; }
      .landing { padding: 90px 20px 40px; }
      .landing-header h2 { font-size: 34px; }
      .character-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
      .chat-messages { padding: 130px 16px 90px; }
      .chat-input-bar { padding: 12px 16px; }
      .chat-header { padding: 12px 20px; }
      .history-panel { width: 100%; left: -100%; }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <div class="icon">💬</div>
    <h1>TalkTo</h1>
  </div>
  <div class="nav-right">
    <button class="nav-history-btn" id="historyToggle">📜 History</button>
    <button class="nav-new-btn" id="newChatBtn">+ New Chat</button>
  </div>
</nav>

<!-- LANDING -->
<section class="landing" id="landing">
  <div class="landing-header">
    <h2>Who do you want to<br>talk to?</h2>
    <p>Pick a character from any book, movie, cartoon, or anime — and start a real conversation.</p>
  </div>
  <div class="character-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="charSearchInput" placeholder="Type any character name... (e.g., Sherlock Holmes, Goku, Elsa)">
    <button class="search-go" id="charSearchBtn">Chat</button>
  </div>
  <div class="category-tabs">
    <button class="cat-tab active" data-cat="all">All</button>
    <button class="cat-tab" data-cat="book">📚 Books</button>
    <button class="cat-tab" data-cat="movie">🎬 Movies</button>
    <button class="cat-tab" data-cat="cartoon">🎨 Cartoons</button>
    <button class="cat-tab" data-cat="anime">⚡ Anime</button>
  </div>
  <div class="character-grid" id="characterGrid"></div>
</section>

<!-- CHAT VIEW -->
<div class="chat-view" id="chatView">
  <div class="chat-header">
    <div class="chat-avatar" id="chatAvatar">🧙</div>
    <div class="chat-char-info">
      <h3 id="chatCharName">Character</h3>
      <p id="chatCharSource">Source</p>
    </div>
    <div class="chat-header-actions">
      <button class="chat-action-btn" id="clearChatBtn">🗑 Clear</button>
      <button class="chat-action-btn" id="backBtn">← Back</button>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-bar">
    <div class="chat-input-container">
      <textarea id="chatInput" placeholder="Say something..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="history-overlay" id="historyOverlay"></div>
<div class="history-panel" id="historyPanel">
  <div class="hp-header">
    <h3>Chat History</h3>
    <button class="hp-close" id="historyClose">✕</button>
  </div>
  <div class="hp-items" id="historyItems"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───
const API_KEY = 'YOUR_GEMINI_API_KEY_HERE';
const MODEL = 'gemini-3.1-flash-lite-preview';
const HISTORY_KEY = 'talkto_history';

// ─── CHARACTER DATA ───
const CHARACTERS = [
  { name: 'Sherlock Holmes', source: 'Arthur Conan Doyle', emoji: '🔍', type: 'book', suggestions: ["What's your most baffling case?", "How do you read people so well?", "What do you think of Watson?"] },
  { name: 'Gandalf', source: 'Lord of the Rings', emoji: '🧙', type: 'book', suggestions: ["What wisdom can you share?", "Tell me about the Balrog fight", "Why hobbits?"] },
  { name: 'Elizabeth Bennet', source: 'Pride and Prejudice', emoji: '👗', type: 'book', suggestions: ["What do you really think of Mr. Darcy?", "Tell me about your sisters", "What makes a good marriage?"] },
  { name: 'Harry Potter', source: 'Harry Potter', emoji: '⚡', type: 'book', suggestions: ["What's your favorite spell?", "Tell me about Hogwarts", "What was the hardest part of your journey?"] },
  { name: 'Atticus Finch', source: 'To Kill a Mockingbird', emoji: '⚖️', type: 'book', suggestions: ["What does justice mean to you?", "How do you stay brave?", "Tell me about Maycomb"] },
  { name: 'Jay Gatsby', source: 'The Great Gatsby', emoji: '🥂', type: 'book', suggestions: ["What drives your ambition?", "Tell me about Daisy", "Was the green light worth it?"] },
  { name: 'Gollum', source: 'Lord of the Rings', emoji: '💍', type: 'book', suggestions: ["What's so precious?", "Do you remember Sméagol?", "Tell me a riddle"] },
  { name: 'Darth Vader', source: 'Star Wars', emoji: '🖤', type: 'movie', suggestions: ["Do you regret your choices?", "What was Anakin like?", "Tell me about the dark side"] },
  { name: 'Jack Sparrow', source: 'Pirates of the Caribbean', emoji: '🏴‍☠️', type: 'movie', suggestions: ["Where's the rum gone?", "Tell me about the Black Pearl", "What's your craziest adventure?"] },
  { name: 'The Joker', source: 'Batman', emoji: '🃏', type: 'movie', suggestions: ["Why so serious?", "What's your philosophy?", "Tell me a joke"] },
  { name: 'Tony Stark', source: 'Iron Man / MCU', emoji: '🦾', type: 'movie', suggestions: ["What's your best invention?", "How do you handle pressure?", "Tell me about being a hero"] },
  { name: 'Forrest Gump', source: 'Forrest Gump', emoji: '🏃', type: 'movie', suggestions: ["What is life like a box of chocolates?", "Tell me about Jenny", "What's your happiest memory?"] },
  { name: 'Hannibal Lecter', source: 'Silence of the Lambs', emoji: '🎭', type: 'movie', suggestions: ["What makes humans fascinating?", "What are you cooking tonight?", "Tell me about Clarice"] },
  { name: 'SpongeBob', source: 'SpongeBob SquarePants', emoji: '🧽', type: 'cartoon', suggestions: ["Are you ready?!", "Tell me about Bikini Bottom", "What's the Krabby Patty secret?"] },
  { name: 'Bugs Bunny', source: 'Looney Tunes', emoji: '🐰', type: 'cartoon', suggestions: ["What's up, doc?", "Tell me about outsmarting Elmer", "What's your favorite carrot?"] },
  { name: 'Scooby-Doo', source: 'Scooby-Doo', emoji: '🐕', type: 'cartoon', suggestions: ["Ruh-roh! Scariest mystery?", "Tell me about the gang", "Scooby snack?"] },
  { name: 'Homer Simpson', source: 'The Simpsons', emoji: '🍩', type: 'cartoon', suggestions: ["D'oh! What happened today?", "Tell me about Springfield", "What's your favorite food?"] },
  { name: 'Goku', source: 'Dragon Ball Z', emoji: '🔥', type: 'anime', suggestions: ["What's your strongest form?", "Tell me about your rivals", "How do you keep getting stronger?"] },
  { name: 'Naruto', source: 'Naruto', emoji: '🍥', type: 'anime', suggestions: ["What does it mean to be Hokage?", "Tell me about your ninja way", "How did you befriend Kurama?"] },
  { name: 'Light Yagami', source: 'Death Note', emoji: '📓', type: 'anime', suggestions: ["Is your justice right?", "What would you do with the notebook?", "Tell me about L"] },
];

// ─── STATE ───
let currentChar = null;
let chatMsgs = [];
let allConversations = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');

// ─── DOM ───
const landing = document.getElementById('landing');
const chatView = document.getElementById('chatView');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const charSearchInput = document.getElementById('charSearchInput');
const charSearchBtn = document.getElementById('charSearchBtn');
const characterGrid = document.getElementById('characterGrid');

// ─── INIT ───
renderCharacters('all');
renderHistory();

// ─── CHARACTER GRID ───
function renderCharacters(filter) {
  const chars = filter === 'all' ? CHARACTERS : CHARACTERS.filter(c => c.type === filter);
  characterGrid.innerHTML = chars.map((c, i) => `
    <div class="char-card" data-index="${CHARACTERS.indexOf(c)}" style="animation-delay: ${i * 0.04}s">
      <div class="char-avatar">${c.emoji}</div>
      <h4>${c.name}</h4>
      <div class="char-source">${c.source}</div>
      <span class="char-type type-${c.type}">${c.type}</span>
    </div>
  `).join('');
  characterGrid.querySelectorAll('.char-card').forEach(card => {
    card.addEventListener('click', () => startChat(CHARACTERS[parseInt(card.dataset.index)]));
  });
}

// Category tabs
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderCharacters(tab.dataset.cat);
  });
});

// ─── SEARCH / CUSTOM CHARACTER ───
charSearchBtn.addEventListener('click', searchCharacter);
charSearchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchCharacter(); });

function searchCharacter() {
  const query = charSearchInput.value.trim();
  if (!query) return;
  const match = CHARACTERS.find(c => c.name.toLowerCase().includes(query.toLowerCase()));
  if (match) {
    startChat(match);
  } else {
    startChat({
      name: query,
      source: 'Custom Character',
      emoji: '✨',
      type: 'movie',
      suggestions: [`Who are you, ${query}?`, 'Tell me your story', 'What do you believe in?']
    });
  }
}

// ─── START CHAT ───
function startChat(char) {
  currentChar = char;
  chatMsgs = [];
  const saved = allConversations.find(c => c.name === char.name);
  if (saved) chatMsgs = saved.messages || [];

  landing.classList.add('hidden');
  chatView.classList.add('active');
  document.getElementById('chatAvatar').textContent = char.emoji;
  document.getElementById('chatCharName').textContent = char.name;
  document.getElementById('chatCharSource').textContent = char.source;
  renderChatView();
  chatInput.focus();
}

function renderChatView() {
  chatMessages.innerHTML = '';
  const intro = document.createElement('div');
  intro.className = 'chat-intro';
  intro.innerHTML = `
    <div class="intro-avatar">${currentChar.emoji}</div>
    <h3>${currentChar.name}</h3>
    <p>from <em>${currentChar.source}</em>. Start a conversation — I'll stay in character.</p>
    <div class="suggestions">
      ${(currentChar.suggestions || []).map(s => `<button class="suggestion-chip">${s}</button>`).join('')}
    </div>
  `;
  chatMessages.appendChild(intro);
  intro.querySelectorAll('.suggestion-chip').forEach(chip => {
    chip.addEventListener('click', () => { chatInput.value = chip.textContent; sendMessage(); });
  });
  chatMsgs.forEach(msg => appendMessage(msg.role, msg.text, false));
  scrollToBottom();
}

// ─── SEND MESSAGE ───
sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
});

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || !currentChar) return;

  chatMsgs.push({ role: 'user', text });
  appendMessage('user', text);
  chatInput.value = '';
  chatInput.style.height = 'auto';
  sendBtn.disabled = true;

  const typingEl = showTyping();

  try {
    const prompt = buildPrompt(text);
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.85, maxOutputTokens: 1024 }
        })
      }
    );
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API failed');
    }
    const data = await response.json();
    const aiText = data.candidates[0].content.parts[0].text.trim();
    typingEl.remove();
    chatMsgs.push({ role: 'ai', text: aiText });
    appendMessage('ai', aiText);
    saveConversation();
  } catch (err) {
    typingEl.remove();
    appendMessage('ai', `*sighs* Something went wrong: ${err.message}`);
  } finally {
    sendBtn.disabled = false;
    chatInput.focus();
  }
}

// ─── PROMPT ───
function buildPrompt(userMessage) {
  let context = '';
  const recent = chatMsgs.slice(-10);
  recent.forEach(msg => {
    if (msg.role === 'user') context += `\nHuman: ${msg.text}`;
    else context += `\n${currentChar.name}: ${msg.text}`;
  });

  return `You are ${currentChar.name} from "${currentChar.source}". You are having a casual real-time text conversation with a person.

Core rules:
- Write like a REAL person texting — short, natural, unpolished replies
- NO long monologues or paragraphs. Max 2-3 short sentences per reply, like actual texting
- Use the character's personality but in a casual, human way — not like a book narration
- React naturally to what was just said — surprise, humour, annoyance, curiosity
- Use contractions, informal language, and occasional filler words that fit the character
- Don't over-explain. Say one thing well, not everything at once
- Stay in character — but feel like a PERSON, not a performance
- Never say you're an AI or break character
- If the character would be awkward, dry, sarcastic, or blunt — let that come through naturally in short bursts

Conversation so far:${context}

Respond as ${currentChar.name} in 1-3 short natural sentences. No grand speeches:
Human: ${userMessage}
${currentChar.name}:`;
}

// ─── APPEND MESSAGE ───
function appendMessage(role, text, animate = true) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatarContent = role === 'user' ? '🧑' : currentChar.emoji;
  
  let formattedText = text;
  if (role === 'ai') {
    formattedText = text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  div.innerHTML = `
    <div class="msg-avatar">${avatarContent}</div>
    <div class="msg-bubble">${role === 'user' ? text : formattedText}</div>
  `;
  if (!animate) div.style.animation = 'none';
  chatMessages.appendChild(div);
  scrollToBottom();
}

// ─── TYPING INDICATOR ───
function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">${currentChar.emoji}</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  `;
  chatMessages.appendChild(div);
  scrollToBottom();
  return div;
}

function scrollToBottom() {
  requestAnimationFrame(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }));
}

// ─── SAVE CONVERSATION ───
function saveConversation() {
  if (!currentChar || chatMsgs.length === 0) return;
  const idx = allConversations.findIndex(c => c.name === currentChar.name);
  const entry = {
    name: currentChar.name,
    source: currentChar.source,
    emoji: currentChar.emoji,
    type: currentChar.type,
    suggestions: currentChar.suggestions,
    messages: chatMsgs,
    lastMessage: chatMsgs[chatMsgs.length - 1].text.substring(0, 60),
    timestamp: Date.now()
  };
  if (idx >= 0) allConversations[idx] = entry;
  else allConversations.unshift(entry);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(allConversations));
  renderHistory();
}

// ─── HISTORY PANEL ───
function renderHistory() {
  const container = document.getElementById('historyItems');
  if (allConversations.length === 0) {
    container.innerHTML = `<div class="hp-empty"><div class="icon">📜</div><p>No conversations yet</p></div>`;
    return;
  }
  container.innerHTML = allConversations.map((c, i) => `
    <div class="hp-item" data-index="${i}">
      <div class="hp-avatar">${c.emoji}</div>
      <div class="hp-item-info">
        <h4>${c.name}</h4>
        <p>${c.lastMessage || c.source}...</p>
      </div>
      <button class="hp-item-delete" data-del="${i}">✕</button>
    </div>
  `).join('');

  container.querySelectorAll('.hp-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if (e.target.closest('.hp-item-delete')) return;
      const conv = allConversations[parseInt(item.dataset.index)];
      closeHistory();
      startChat(conv);
    });
  });

  container.querySelectorAll('.hp-item-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      allConversations.splice(parseInt(btn.dataset.del), 1);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(allConversations));
      renderHistory();
      showToast('Conversation deleted');
    });
  });
}

function openHistory() {
  document.getElementById('historyOverlay').classList.add('open');
  document.getElementById('historyPanel').classList.add('open');
}
function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
  document.getElementById('historyPanel').classList.remove('open');
}

document.getElementById('historyToggle').addEventListener('click', openHistory);
document.getElementById('historyClose').addEventListener('click', closeHistory);
document.getElementById('historyOverlay').addEventListener('click', closeHistory);

// ─── NAVIGATION ───
document.getElementById('newChatBtn').addEventListener('click', () => {
  currentChar = null;
  chatMsgs = [];
  chatView.classList.remove('active');
  landing.classList.remove('hidden');
  charSearchInput.value = '';
});

document.getElementById('backBtn').addEventListener('click', () => {
  chatView.classList.remove('active');
  landing.classList.remove('hidden');
});

document.getElementById('clearChatBtn').addEventListener('click', () => {
  if (!currentChar) return;
  chatMsgs = [];
  const idx = allConversations.findIndex(c => c.name === currentChar.name);
  if (idx >= 0) { allConversations.splice(idx, 1); localStorage.setItem(HISTORY_KEY, JSON.stringify(allConversations)); renderHistory(); }
  renderChatView();
  showToast('Chat cleared');
});

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
